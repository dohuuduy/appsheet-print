<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Báo cáo</title>
<style>
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Times New Roman",serif;font-size:13px;color:#1a1a18;background:#e0e0db}
.toolbar{background:#1e1e1c;color:#fff;padding:0 20px;height:46px;
  display:flex;align-items:center;gap:10px;font-family:-apple-system,sans-serif;
  position:sticky;top:0;z-index:100}
.toolbar h1{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb-btn{padding:6px 13px;border-radius:6px;border:1px solid rgba(255,255,255,.2);
  background:none;color:#fff;cursor:pointer;font-size:12px}
.tb-btn:hover{background:rgba(255,255,255,.1)}
.tb-btn.primary{background:#185FA5;border-color:#185FA5}
.preview-badge{font-size:11px;padding:2px 8px;border-radius:12px;background:rgba(239,159,39,.3);color:#fbbf24}
.pw{padding:24px;display:flex;flex-direction:column;align-items:center}
.paper{background:#fff;width:210mm;padding:16mm 18mm;box-shadow:0 3px 24px rgba(0,0,0,.14)}
.spin{width:20px;height:20px;border:2px solid #ddd;border-top-color:#185FA5;
  border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.state{display:flex;flex-direction:column;align-items:center;gap:14px;padding:60px 20px;text-align:center;color:#6b6b67}
.err{background:#fcebeb;border:1px solid rgba(163,45,45,.2);border-radius:8px;
  padding:14px;color:#A32D2D;font-size:13px;font-family:-apple-system,sans-serif;margin:20px;line-height:1.7}
/* Block styles */
.b-dochd{display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:18px;padding-bottom:12px;border-bottom:2px solid #1a1a18}
.dhl{font-size:11px;color:#6b6b67;line-height:1.8}
.dhl strong{font-size:17px;font-weight:700;color:#1a1a18;display:block;margin-bottom:2px}
.dhr{text-align:right;font-size:11px;color:#6b6b67;line-height:1.8}
.dhr strong{font-size:18px;font-weight:700;color:#1a1a18;display:block;letter-spacing:.02em}
.b-tbl{width:100%;border-collapse:collapse;font-size:12px;margin:4px 0}
.b-tbl th{background:#1a1a18;color:#fff;padding:6px 8px;text-align:left;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.b-tbl td{padding:5px 8px;border-bottom:1px solid rgba(0,0,0,.1);vertical-align:top}
.b-tbl tr:nth-child(even) td{background:#f7f7f5}
.b-tbl tfoot td{font-weight:700;background:#f7f7f5;border-top:2px solid rgba(0,0,0,.2)}
.b-amt{display:flex;justify-content:flex-end;margin:6px 0}
.b-amt-in{border:1px solid rgba(0,0,0,.2);border-radius:8px;padding:8px 16px;text-align:right}
.b-amt-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#6b6b67}
.b-amt-val{font-size:18px;font-weight:700}
.b-amt-wrd{font-size:10px;color:#9b9b96;font-style:italic;margin-top:2px}
.b-sign{display:flex;justify-content:space-around;margin:20px 0 4px}
.sc{text-align:center;font-size:11px;color:#6b6b67}
.sl{width:100px;border-bottom:1px solid rgba(0,0,0,.2);height:32px;margin:0 auto 4px}
.sn{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.04em}
.b-logo{display:flex;align-items:center;gap:12px;margin:4px 0}
.b-div{border:none;border-top:2px solid #1a1a18;margin:6px 0}
.b-divl{border:none;border-top:1px solid rgba(0,0,0,.1);margin:4px 0}
.b-hl{display:flex;align-items:flex-start;gap:8px;border-radius:6px;padding:8px 12px;margin:4px 0}
.b-2col{display:grid;gap:12px;margin:4px 0}
.b-qr-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px;margin:4px 0}
.b-footer{margin-top:16px;padding-top:10px;border-top:1px solid rgba(0,0,0,.1);
  font-size:10px;color:#9b9b96;text-align:center;line-height:1.9}
@media print{
  body{background:#fff}
  .toolbar,.no-print{display:none!important}
  .pw{padding:0}.paper{box-shadow:none;width:100%;padding:0;margin:0}
  .b-tbl tr{page-break-inside:avoid}
  .b-tbl thead{display:table-header-group}
  @page{margin:12mm 14mm}
  body{counter-reset:page}
  .b-pagenum.with-total::after{content:" " counter(page) " / " counter(pages)}
  .b-pagenum:not(.with-total)::after{content:" " counter(page)}
}
</style>
</head>
<body>
<div class="toolbar no-print">
  <h1 id="tb-title">Đang tải...</h1>
  <span id="preview-badge" class="preview-badge" style="display:none">&#128065; XEM THỬ</span>
  <button class="tb-btn" onclick="window.close()">&#10005; Đóng</button>
  <button class="tb-btn primary" onclick="window.print()">&#128438; In / PDF</button>
</div>
<div class="pw"><div class="paper" id="paper">
  <div class="state"><div class="spin"></div><p>Đang tải dữ liệu...</p></div>
</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const API_URL       = "https://script.google.com/macros/s/AKfycbwqwRgBqKmL5yGY8YD0MrJi-iQUusgQPplEOfqzWsXHpDf-HZus900DueXzxYIe9V-i/exec";
const Q           = new URLSearchParams(location.search);
const ROW_ID      = Q.get("id") || "";
const TPL_ID      = Q.get("tpl") || "";
const SHEET       = Q.get("sheet") || "";
const PREVIEW     = Q.get("preview") === "1";
const AUTOPRINT   = Q.get("autoprint") === "1";
const LS_KEY      = "ps_tpl_v4";

const DEMO = {
  MaDonHang:"DH-001",NgayTao:"15/04/2024",NgayDat:"15/04/2024",
  TenKhachHang:"Nguyễn Văn An",SoDienThoai:"0901 234 567",
  DiaChi:"123 Lê Lợi, Q.1, TP.HCM",Email:"an@email.com",
  TenSanPham:"Laptop Dell XPS 15",SoLuong:"2",DonGia:"28500000",
  ThanhTien:"57000000",TongTien:"57000000",SoTien:"57000000",
  TrangThai:"Đã thanh toán",GhiChu:"Giao trước 5pm",
  PhuongThucThanhToan:"Chuyển khoản",SoPhieu:"PX-001",NgayXuat:"15/04/2024",
  TenKho:"Kho A",NguoiXuat:"Nguyễn Văn B",LyDoXuat:"Xuất bán",
  HoTen:"Nguyễn Văn An",MaNhanVien:"NV001",PhongBan:"Kinh doanh",
  ChucVu:"Nhân viên",LuongThucNhan:"15000000",Thang:"4",Nam:"2024",
  KyBaoCao:"Q1/2024",TenNguoiNop:"Nguyễn Văn C",NoiDung:"Thu tiền hàng",NgayThu:"15/04/2024",
};

async function api(p) {
  const r = await fetch(API_URL+"?"+new URLSearchParams(p));
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return d;
}

async function main() {
  try {
    // 1. Load template config
    let blocks=null, tplName="BÁO CÁO", po={};
    if (TPL_ID) {
      try {
        const ls=JSON.parse(localStorage.getItem(LS_KEY)||"{}");
        if (ls[TPL_ID]) { blocks=ls[TPL_ID].blocks||[]; tplName=ls[TPL_ID].name||tplName; po=ls[TPL_ID].pageSettings||{}; }
      } catch(e){}
    }
    if (!blocks && TPL_ID) {
      try {
        const d=await api({action:"getConfig",tplId:TPL_ID});
        if (d.template?.printOptions?.templateBlocks) {
          blocks=d.template.printOptions.templateBlocks;
          tplName=d.template.tplName||tplName;
          po=d.template.printOptions||{};
        }
      } catch(e){}
    }
    if (!blocks?.length) throw new Error("Không tìm thấy template. tplId="+TPL_ID);

    // 2. Parse dataSources từ URL
    let dataSources=[];
    try { const qp=Q.get("queries"); if(qp) dataSources=JSON.parse(decodeURIComponent(qp)); } catch(e){}
    if (!dataSources.length && po.dataSources) {
      try { dataSources=JSON.parse(po.dataSources); } catch(e){}
    }

    // 3. Load data
    let row=DEMO, extraData={};
    if (!PREVIEW) {
      if (!ROW_ID||!SHEET) throw new Error("Thiếu tham số id hoặc sheet");
      const d=await api({action:"getData",sheet:SHEET,id:ROW_ID});
      if (!d.row) throw new Error("Không tìm thấy dòng id="+ROW_ID);
      row=d.row;

      // Load sheet phụ song song
      if (dataSources.length) {
        const tasks = dataSources.filter(ds=>ds.sheet&&ds.joinOn).map(async ds => {
          const alias=ds.as||ds.sheet;
          try {
            const joinVal=String(row[ds.joinOn]||ROW_ID);
            // Thử lấy nhiều dòng (1-nhiều)
            const d2=await api({action:"getData",sheet:ds.sheet,all:"true",filterCol:ds.joinOn,filterVal:joinVal});
            extraData[alias]={ rows:d2.rows||[], headers:d2.headers||[] };
            // Nếu không có rows, thử lấy 1 dòng
            if (!d2.rows?.length) {
              const d1=await api({action:"getData",sheet:ds.sheet,id:joinVal});
              if (d1.row) extraData[alias]={ rows:[d1.row], headers:d1.headers||[] };
            }
          } catch(e) { extraData[alias]={rows:[],headers:[],error:e.message}; }
        });
        await Promise.all(tasks);
      }
    } else {
      for (const ds of dataSources) {
        const alias=ds.as||ds.sheet;
        extraData[alias]={rows:[DEMO],headers:Object.keys(DEMO)};
      }
    }

    // 4. Apply page style
    applyPageStyle(po);

    // 5. Render
    const html = blocks.map(b=>renderBlock(b,row,extraData)).join("") + renderFooter(row,po);
    document.getElementById("paper").innerHTML = html;

    // 6. QR codes
    setTimeout(()=>renderQRAll(row,extraData), 300);

    // 7. UI
    document.title = tplName;
    document.getElementById("tb-title").textContent = (PREVIEW?"[XEM THỬ] ":"")+tplName;
    if (PREVIEW) document.getElementById("preview-badge").style.display="";
    if (AUTOPRINT||po.autoprint) setTimeout(()=>window.print(), 800);

  } catch(e) {
    document.getElementById("paper").innerHTML =
      `<div class="err"><strong>Lỗi:</strong> ${esc(e.message)}<br>
       <small style="color:#9b9b96">Kiểm tra URL · API · tplId · sheet</small></div>`;
  }
}

function applyPageStyle(po) {
  const sizes={A4:{w:"210mm",h:"297mm"},A5:{w:"148mm",h:"210mm"},letter:{w:"216mm",h:"279mm"},"80mm":{w:"80mm",h:"auto"},K57:{w:"57mm",h:"auto"}};
  const sz=sizes[po.paper||"A4"]||sizes.A4;
  const isL=po.orient==="landscape";
  const w=isL&&sz.h!=="auto"?sz.h:sz.w, h=sz.h==="auto"?"auto":(isL&&sz.h!=="auto"?sz.w:sz.h);
  const s=document.createElement("style");
  s.textContent=`@page{size:${w} ${h==="auto"?"":h};margin:${po.marginTop||12}mm ${po.marginRight||14}mm ${po.marginBottom||12}mm ${po.marginLeft||14}mm}.paper{width:${w};${h!=="auto"?`min-height:${h}`:""};}`;
  if (po.fontFamily) s.textContent+=`.paper{font-family:${po.fontFamily};}`;
  if (po.baseFontSize) s.textContent+=`.paper{font-size:${po.baseFontSize}px;}`;
  document.head.appendChild(s);
}

function renderBlock(b, row, extraData) {
  if (!b||!b.type) return "";
  extraData = extraData||{};
  const wbg = html => {
    const bg=b.bgColor||"transparent",pt=b.paddingTop||0,pb2=b.paddingBottom||0,pl=b.paddingLeft||0,pr=b.paddingRight||0;
    if (bg==="transparent"&&!pt&&!pb2&&!pl&&!pr) return html;
    return `<div style="background:${bg};padding:${pt}px ${pr}px ${pb2}px ${pl}px;border-radius:4px">${html}</div>`;
  };
  const fv = k => { const v=row[k]; return (v===null||v===undefined||v==="")?"—":String(v); };
  const tpl = str => String(str||"").replace(/\{\{([^}]+)\}\}/g,(_,k)=>{
    if (k.endsWith("_words")) return soThanhChu(row[k.replace("_words","")]);
    return fv(k.trim());
  });
  const txSt = b => {
    let s="";
    if(b.bold)s+="font-weight:700;"; if(b.italic)s+="font-style:italic;";
    if(b.underline)s+="text-decoration:underline;";
    if(b.fontFamily)s+=`font-family:${b.fontFamily};`;
    if(b.lineHeight)s+=`line-height:${b.lineHeight};`;
    return s;
  };

  let html="";
  switch(b.type) {
    case "docheader":
      html=`<div class="b-dochd">
        <div class="dhl"><strong>${esc(b.companyName||"")}</strong>${esc(b.companyInfo||"").replace(/\n/g,"<br>")}</div>
        <div class="dhr"><strong>${fv(b.docNumField||"MaDonHang")}</strong>${esc(b.docTitle||"")}<br>Ngày: ${fv(b.dateField||"NgayTao")}</div>
      </div>`; break;

    case "logo": {
      const al=b.logoAlign||"left";
      const lgEl=b.logoData
        ?`<img src="${b.logoData}" style="width:${b.logoWidth||80}px;height:auto;max-height:80px;object-fit:contain">`
        :`<div style="width:${b.logoWidth||80}px;height:50px;border:1px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:9px;color:#aaa">LOGO</div>`;
      html=`<div class="b-logo" style="justify-content:${al==="right"?"flex-end":al==="center"?"center":"flex-start"}">${lgEl}<div style="margin-left:10px"><div style="font-size:16px;font-weight:700">${esc(b.companyName||"")}</div><div style="font-size:11px;color:#6b6b67">${esc(b.subTitle||"")}</div></div></div>`; break; }

    case "heading":
      html=`<div style="text-align:${b.align||"center"};color:${b.color||"#1a1a18"};font-size:${b.size||20}px;font-weight:700;line-height:1.3;${txSt(b)}">${tpl(b.text)}</div>`; break;
    case "subheading":
      html=`<div style="text-align:${b.align||"left"};color:${b.color||"#1a1a18"};font-size:${b.size||15}px;font-weight:600;line-height:1.4;${txSt(b)}">${tpl(b.text)}</div>`; break;
    case "text":
      html=`<div style="text-align:${b.align||"left"};color:${b.color||"#6b6b67"};font-size:${b.size||13}px;line-height:1.7;white-space:pre-wrap;${txSt(b)}">${tpl(b.text)}</div>`; break;
    case "richtext":
      html=`<div style="text-align:${b.align||"left"};color:${b.color||"#1a1a18"};font-size:${b.size||13}px;line-height:1.7;${txSt(b)}">${tpl(b.content||"")}</div>`; break;

    case "field":
      html=`<div style="font-size:12px;margin:2px 0">${b.showLabel&&b.label?`<span style="font-size:10px;font-weight:700;text-transform:uppercase;color:#9b9b96;margin-right:6px">${esc(b.label)}:</span>`:""}<span style="font-weight:500">${fv(b.fieldName)}</span></div>`; break;
    case "fieldrow":
      html=`<div style="display:flex;gap:8px;align-items:baseline;font-size:12px;margin:2px 0"><span style="font-size:10px;font-weight:700;text-transform:uppercase;color:#9b9b96;white-space:nowrap;min-width:80px">${esc(b.label||b.fieldName||"")}:</span><span style="font-weight:500">${fv(b.fieldName)}</span></div>`; break;

    case "infogrid": {
      const fields=b.fields||[];
      html=`<dl style="display:grid;grid-template-columns:1fr 1fr;gap:0 22px;margin:6px 0">${fields.map(f=>`<div><dt style="font-size:10px;font-weight:700;text-transform:uppercase;color:#9b9b96;margin-top:7px">${esc(f.label||f.field)}</dt><dd style="font-size:12px;font-weight:500">${fv(f.field)}</dd></div>`).join("")}</dl>`; break; }

    case "datatable": case "subtable": {
      const dc=b.columns||[], ts=b.tblStyle||{};
      const hbg=ts.headerBg||"#1a1a18", hcl=ts.headerColor||"#fff";
      const bs=ts.borderStyle||"all", bw=ts.borderWidth||1, bc=ts.borderColor||"rgba(0,0,0,.1)";
      const thB=bs==="none"?"border:none":`border:${bw}px solid ${bc}`;
      const tdB=bs==="none"?"border:none":`border-bottom:${bw}px solid ${bc}`;
      // Lấy rows: subtable dùng extraData, datatable dùng row chính
      let rows=[row];
      if (b.type==="subtable"&&b.dsAlias&&extraData[b.dsAlias]) {
        const ed=extraData[b.dsAlias];
        rows=ed.rows?.length?ed.rows:(ed.row?[ed.row]:[row]);
      }
      const tfoot = b.showTotal&&dc.length ? (() => {
        const sums=dc.map(c=>{const ns=rows.map(r=>parseNum(r[c])).filter(n=>!isNaN(n)&&n!==0);return ns.length?ns.reduce((a,x)=>a+x,0):null;});
        return `<tfoot><tr>${sums.map((s,i)=>`<td style="${tdB}">${i===0?"Tổng":s!=null?fmtMoney(s):""}</td>`).join("")}</tr></tfoot>`;
      })() : "";
      html=`<table class="b-tbl" style="${bs==="outer"?`border:${bw}px solid ${bc}`:""}">
        <thead><tr style="background:${hbg};color:${hcl}">${dc.length?dc.map(c=>`<th style="${thB}">${esc(c)}</th>`).join(""):"<th>Cột 1</th><th>Cột 2</th>"}</tr></thead>
        <tbody>${rows.map((r,ri)=>`<tr style="${ri%2===1?`background:${ts.stripeBg||"#f7f7f5"}`:""}">
          ${dc.map(c=>`<td style="${tdB}">${esc(String(r[c]??'—'))}</td>`).join("")}
        </tr>`).join("")}</tbody>${tfoot}</table>`; break; }

    case "amount": {
      const amt=row[b.fieldName]||"0";
      html=`<div class="b-amt"><div class="b-amt-in"><div class="b-amt-lbl">${esc(b.label||"TỔNG CỘNG")}</div><div class="b-amt-val">${fmtMoney(amt)} ₫</div>${b.showWords?`<div class="b-amt-wrd">(${soThanhChu(amt)})</div>`:""}</div></div>`; break; }

    case "custom": {
      const val=calcFormula(b.formula||"0",row);
      html=`<div style="display:flex;gap:8px;align-items:baseline;font-size:12px;margin:2px 0"><span style="font-size:10px;font-weight:700;text-transform:uppercase;color:#9b9b96;white-space:nowrap;min-width:80px">${esc(b.label||"")}:</span><span style="font-weight:500">${fmtMoney(val)} ₫</span></div>`; break; }

    case "sign": {
      const lbs=(b.labels||["Người lập","Người duyệt","Người nhận"]).slice(0,b.count||3);
      html=`<div class="b-sign">${lbs.map(l=>`<div class="sc"><div class="sl"></div><div class="sn">${esc(l)}</div><div style="font-size:10px;margin-top:2px">(Ký, ghi rõ họ tên)</div></div>`).join("")}</div>`; break; }

    case "divider":      html=`<hr class="b-div">`; break;
    case "dividerlight": html=`<hr class="b-divl">`; break;
    case "spacer":       html=`<div style="height:${b.height||20}px"></div>`; break;
    case "pagebreak":    html=`<div style="page-break-after:always"></div>`; break;

    case "pagenum":
      html=`<div class="b-pagenum ${b.format&&b.format.includes("total")?"with-total":""}"
        style="text-align:${b.align||"center"};font-size:${b.size||11}px;font-style:italic;color:#9b9b96;margin:4px 0">
        ${esc((b.format||"Trang {{page}}").replace("{{page}}","").replace("{{total}}","")).trim()||"Trang "}
      </div>`; break;

    case "qrcode": {
      const sz=b.size||80, al=b.align||"center";
      const qrId="qr-"+Math.random().toString(36).slice(2,7);
      html=`<div class="b-qr-wrap" style="align-items:${al==="right"?"flex-end":al==="left"?"flex-start":"center"}">
        <div id="${qrId}" data-field="${esc(b.fieldName||"")}" data-size="${sz}"
             style="width:${sz}px;height:${sz}px;display:inline-block"></div>
        ${b.label?`<div style="font-size:10px;color:#6b6b67">${esc(b.label)}</div>`:""}
      </div>`; break; }

    case "condition": {
      const val=String(row[b.condField]||""), cval=String(b.condValue||"");
      let show=false;
      switch(b.condOp){
        case "eq": show=val===cval; break; case "neq": show=val!==cval; break;
        case "gt": show=parseFloat(val)>parseFloat(cval); break;
        case "lt": show=parseFloat(val)<parseFloat(cval); break;
        case "contains": show=val.includes(cval); break;
        case "empty": show=!val||val.trim()===""; break;
        case "notempty": show=!!val&&val.trim()!==""; break;
        default: show=true;
      }
      if (!show) return "";
      html=(b.innerBlocks||[]).map(cb=>renderBlock(cb,row,extraData)).join(""); break; }

    case "highlight": {
      const bg=b.bgColor||"#faeeda",brd=b.borderColor||"#854F0B",tc=b.textColor||"#854F0B";
      html=`<div class="b-hl" style="background:${bg};border:1.5px solid ${brd}">${b.icon?`<span style="font-size:16px;flex-shrink:0">${b.icon}</span>`:""}<span style="font-size:${b.size||13}px;color:${tc};font-weight:${b.bold?"700":"400"}">${tpl(b.text||"")}</span></div>`; break; }

    case "twocol": {
      const parts=(b.ratio||"50:50").split(":"), l=parseInt(parts[0]), ri=100-l;
      html=`<div class="b-2col" style="grid-template-columns:${l}fr ${ri}fr">
        ${(b.leftBlocks||[]).map(cb=>renderBlock(cb,row,extraData)).join("")}
        ${(b.rightBlocks||[]).map(cb=>renderBlock(cb,row,extraData)).join("")}
      </div>`; break; }

    default: html=""; break;
  }
  return wbg(html);
}

function renderFooter(row, po) {
  const parts=[];
  if (po.footer) parts.push(esc(po.footer));
  if (po.showDate!==false) parts.push("In lúc: "+new Date().toLocaleString("vi-VN"));
  if (PREVIEW) parts.push("<strong style='color:#b45309'>[DỮ LIỆU XEM THỬ]</strong>");
  return parts.length?`<div class="b-footer">${parts.join(" &nbsp;·&nbsp; ")}</div>`:"";
}

function renderQRAll(row, extraData) {
  document.querySelectorAll("[data-field][data-size]").forEach(el => {
    const field=el.dataset.field, sz=parseInt(el.dataset.size)||80;
    const val=row[field]?String(row[field]):"";
    if (!val||!window.QRCode) { el.innerHTML=`<div style="font-size:8px;color:#aaa;text-align:center;padding:4px">QR<br>${esc(field)}</div>`; return; }
    try { el.innerHTML=""; new QRCode(el,{text:val,width:sz,height:sz,colorDark:"#000000",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.M}); }
    catch(e) { el.textContent="QR: "+val; }
  });
}

function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fmtMoney(v){const n=parseFloat(String(v||"0").replace(/[^0-9.\-]/g,""));return isNaN(n)?String(v||"—"):n.toLocaleString("vi-VN");}
function parseNum(v){return parseFloat(String(v||"0").replace(/[^0-9.\-]/g,""))||0;}
function calcFormula(formula,row){
  try{
    let expr=String(formula).replace(/([0-9]),([0-9])/g,"$1.$2")
      .replace(/\{([^}]+)\}/g,(_,k)=>{const v=parseNum(row[k.trim()]);return isNaN(v)?0:v;});
    const val=Function('"use strict";return('+expr+')')();
    return isNaN(val)?formula:val;
  }catch(e){return formula;}
}

// Số thành chữ tiếng Việt
const _dv=["","một","hai","ba","bốn","năm","sáu","bảy","tám","chín"],_h=["","nghìn","triệu","tỷ"];
function _d3(n){if(!n)return"";const t=Math.floor(n/100),c=Math.floor((n%100)/10),d=n%10;let s="";
  if(t)s+=_dv[t]+" trăm ";if(c>1)s+=_dv[c]+" mươi ";else if(c===1)s+="mười ";
  if(d&&c>1)s+=(d===1?"mốt":_dv[d])+" ";else if(d)s+=_dv[d]+" ";return s.trim();}
function soThanhChu(raw){let n=parseInt(String(raw||"0").replace(/[^0-9]/g,""))||0;
  if(!n)return"không đồng";let res="",i=0;
  while(n>0){const p=n%1000;if(p)res=_d3(p)+(_h[i]?" "+_h[i]+" ":"")+res;n=Math.floor(n/1000);i++;}
  return(res.trim().charAt(0).toUpperCase()+res.trim().slice(1))+" đồng";}
